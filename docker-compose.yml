version: '3.8'
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: nagging-postgres-container
    ports:
      - "{DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:latest
    container_name: nagging-redis-container
    ports:
      - "${REDIS_PORT}:6379"
    restart: always