version: '3.8'
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: postgres-container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # Redis (그대로 유지)
  redis:
    image: redis:latest
    container_name: redis-container
    ports:
      - "${REDIS_PORT}:6379"